<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>1-bit Bitmap Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --border: #2a2a2a;
    --green: #00ff41;
    --green-dim: #00a828;
    --green-dark: #003310;
    --amber: #ffb300;
    --text: #c8ffc8;
    --scanline: rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  h1 {
    font-family: 'VT323', monospace;
    font-size: 2.4rem;
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--green-dim);
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1100px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px;
    position: relative;
  }

  .panel::before {
    content: attr(data-label);
    position: absolute;
    top: -10px;
    left: 12px;
    background: var(--panel);
    padding: 0 8px;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--green-dim);
  }

  /* Drop zone */
  #dropzone {
    border: 2px dashed var(--green-dim);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 260px;
    cursor: pointer;
    transition: all 0.2s;
    gap: 10px;
    background: var(--green-dark);
    position: relative;
    overflow: hidden;
  }

  #dropzone:hover, #dropzone.dragover {
    border-color: var(--green);
    background: #004418;
    box-shadow: inset 0 0 30px rgba(0,255,65,0.05);
  }

  #dropzone .icon {
    font-size: 3rem;
    line-height: 1;
    filter: drop-shadow(0 0 8px var(--green));
  }

  #dropzone .hint {
    font-size: 0.8rem;
    color: var(--green-dim);
    letter-spacing: 1px;
    text-align: center;
  }

  #fileInput { display: none; }

  /* Controls */
  .controls {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  label {
    font-size: 0.72rem;
    color: var(--green-dim);
    letter-spacing: 1px;
    min-width: 90px;
  }

  input[type=range] {
    flex: 1;
    accent-color: var(--green);
    height: 3px;
  }

  .val {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    color: var(--amber);
    min-width: 40px;
    text-align: right;
  }

  select {
    background: #0d0d0d;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 4px 8px;
    cursor: pointer;
    flex: 1;
  }

  button {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  button:hover {
    background: var(--green);
    color: #000;
    box-shadow: 0 0 20px var(--green);
  }

  button:disabled {
    border-color: var(--border);
    color: #333;
    cursor: not-allowed;
  }

  button:disabled:hover {
    background: transparent;
    color: #333;
    box-shadow: none;
  }

  /* Preview */
  #previewCanvas {
    width: 100%;
    image-rendering: pixelated;
    border: 1px solid var(--border);
    display: block;
    background: #000;
  }

  .preview-info {
    margin-top: 8px;
    font-size: 0.68rem;
    color: var(--green-dim);
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }

  /* Output area */
  .output-panel {
    grid-column: 1 / -1;
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .output-meta {
    font-size: 0.7rem;
    color: var(--green-dim);
    letter-spacing: 1px;
  }

  .output-meta span {
    color: var(--amber);
  }

  #outputText {
    background: #050505;
    border: 1px solid var(--border);
    color: #7eff7e;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    width: 100%;
    height: 200px;
    resize: vertical;
    padding: 12px;
    line-height: 1.7;
    letter-spacing: 0.5px;
    outline: none;
    word-break: break-all;
  }

  #outputText:focus {
    border-color: var(--green-dim);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .stat-bar {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    padding: 10px;
    background: #050505;
    border: 1px solid var(--border);
    font-size: 0.68rem;
    color: var(--green-dim);
    flex-wrap: wrap;
    gap: 12px;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: 'VT323', monospace; font-size: 1.1rem; color: var(--amber); }

  .progress-wrap {
    margin-top: 10px;
    height: 2px;
    background: var(--border);
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.1s;
    box-shadow: 0 0 8px var(--green);
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .output-panel { grid-column: 1; }
  }
</style>
</head>
<body>

<h1>▓ BITMAP CONVERTER</h1>
<p class="subtitle">IMAGE → 320×200 → DECIMAL DUMP / OS TESTING UTILITY</p>

<div class="grid">
  <!-- Input Panel -->
  <div class="panel" data-label="[ INPUT ]">
    <div id="dropzone">
      <div class="icon">⬛</div>
      <div class="hint">DROP IMAGE HERE<br>or CLICK TO SELECT</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="controls">
      <div class="ctrl-row">
        <label>MODE</label>
        <select id="colorMode">
          <option value="1bit">1BIT (MONOCHROME)</option>
          <option value="8bit">8BIT (DOOM PALETTE 0)</option>
          <option value="8bit_gray">8BIT (GRAYSCALE)</option>
        </select>
      </div>
      <div id="oneBitOptions">
      <div class="ctrl-row">
        <label>THRESHOLD</label>
        <input type="range" id="threshold" min="0" max="255" value="128">
        <span class="val" id="thresholdVal">128</span>
      </div>
      <div class="ctrl-row">
        <label>DITHERING</label>
        <select id="dither">
          <option value="none">NONE</option>
          <option value="floyd">FLOYD-STEINBERG</option>
          <option value="ordered">ORDERED (BAYER 4x4)</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>INVERT</label>
        <select id="invert">
          <option value="0">OFF</option>
          <option value="1">ON</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>BIT ORDER</label>
        <select id="bitOrder">
          <option value="msb">MSB FIRST (bit7→bit0)</option>
          <option value="lsb">LSB FIRST (bit0→bit7)</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>NIBBLE ORDER</label>
        <select id="nibbleOrder">
          <option value="hi_lo">HI → LO</option>
          <option value="lo_hi">LO → HI</option>
        </select>
      </div>
      </div><!-- /oneBitOptions -->
      <div class="ctrl-row" style="margin-top:4px;">
        <button id="convertBtn" disabled>▶ CONVERT</button>
      </div>
    </div>
  </div>

  <!-- Preview Panel -->
  <div class="panel" data-label="[ PREVIEW ]">
    <canvas id="previewCanvas" width="320" height="200"></canvas>
    <div class="preview-info">
      <span id="previewSize">—</span>
      <span id="previewBits">—</span>
    </div>

    <div class="stat-bar">
      <div class="stat"><div class="stat-val" id="statTotal">—</div><div>TOTAL BYTES</div></div>
      <div class="stat"><div class="stat-val" id="statPixels">—</div><div>PIXELS</div></div>
      <div class="stat"><div class="stat-val" id="statOnes">—</div><div>WHITE PX</div></div>
      <div class="stat"><div class="stat-val" id="statZeros">—</div><div>BLACK PX</div></div>
    </div>
  </div>

  <!-- Output Panel -->
  <div class="panel output-panel" data-label="[ DECIMAL DUMP — 1BIT:NIBBLE(0-15) / 8BIT:PALETTE INDEX(0-255) ]">
    <div class="output-header">
      <div class="output-meta">
        FORMAT: <span>nibble(0-15)</span> per line &nbsp;|&nbsp;
        TOTAL LINES: <span id="metaLines">—</span> &nbsp;|&nbsp;
        TOTAL NIBBLES: <span id="metaNibbles">—</span>
      </div>
      <div class="btn-row" style="margin:0">
        <button id="copyBtn" disabled>⎘ COPY</button>
        <button id="dlBtn" disabled>↓ DOWNLOAD .TXT</button>
        <button id="dlBinBtn" disabled>↓ DOWNLOAD .BIN</button>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <textarea id="outputText" readonly placeholder="// 変換後のデータがここに表示されます
// 4ビット(nibble)単位で1行ずつ 0-15の10進数で出力
// 例: 1行目=上位nibble, 2行目=下位nibble ..."></textarea>
  </div>
</div>

<script>
const W = 320, H = 200;
const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const convertBtn = document.getElementById('convertBtn');
const copyBtn = document.getElementById('copyBtn');
const dlBtn = document.getElementById('dlBtn');
const dlBinBtn = document.getElementById('dlBinBtn');
const thresholdSlider = document.getElementById('threshold');
const thresholdVal = document.getElementById('thresholdVal');
const ditherSel = document.getElementById('dither');
const invertSel = document.getElementById('invert');
const bitOrderSel = document.getElementById('bitOrder');
const nibbleOrderSel = document.getElementById('nibbleOrder');
const colorModeSel = document.getElementById('colorMode');
const outputText = document.getElementById('outputText');

let loadedImage = null;
let binaryBytes = null;

// Threshold display
thresholdSlider.addEventListener('input', () => {
  thresholdVal.textContent = thresholdSlider.value;
});

// Drop zone
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      loadedImage = img;
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(img, 0, 0, W, H);
      dropzone.querySelector('.hint').textContent = file.name;
      document.getElementById('previewSize').textContent = `SRC: ${img.naturalWidth}×${img.naturalHeight}`;
      document.getElementById('previewBits').textContent = `→ 320×200 ${colorModeSel.value.toUpperCase()}`;
      convertBtn.disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function getGray(r, g, b) {
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

// Bayer 4x4 matrix
const bayer4 = [
   0,  8,  2, 10,
  12,  4, 14,  6,
   3, 11,  1,  9,
  15,  7, 13,  5
];

const DOOM_PALETTE = [[0,0,0],[31,23,11],[23,15,7],[75,75,75],[255,255,255],[27,27,27],[19,19,19],[11,11,11],[7,7,7],[47,55,31],[35,43,15],[23,31,7],[15,23,0],[79,59,43],[71,51,35],[63,43,27],[255,183,183],[247,171,171],[243,163,163],[235,151,151],[231,143,143],[223,135,135],[219,123,123],[211,115,115],[203,107,107],[199,99,99],[191,91,91],[187,87,87],[179,79,79],[175,71,71],[167,63,63],[163,59,59],[155,51,51],[151,47,47],[143,43,43],[139,35,35],[131,31,31],[127,27,27],[119,23,23],[115,19,19],[107,15,15],[103,11,11],[95,7,7],[91,7,7],[83,7,7],[79,0,0],[71,0,0],[67,0,0],[255,235,223],[255,227,211],[255,219,199],[255,211,187],[255,207,179],[255,199,167],[255,191,155],[255,187,147],[255,179,131],[247,171,123],[239,163,115],[231,155,107],[223,147,99],[215,139,91],[207,131,83],[203,127,79],[191,123,75],[179,115,71],[171,111,67],[163,107,63],[155,99,59],[143,95,55],[135,87,51],[127,83,47],[119,79,43],[107,71,39],[95,67,35],[83,63,31],[75,55,27],[63,47,23],[51,43,19],[43,35,15],[239,239,239],[231,231,231],[223,223,223],[219,219,219],[211,211,211],[203,203,203],[199,199,199],[191,191,191],[183,183,183],[179,179,179],[171,171,171],[167,167,167],[159,159,159],[151,151,151],[147,147,147],[139,139,139],[131,131,131],[127,127,127],[119,119,119],[111,111,111],[107,107,107],[99,99,99],[91,91,91],[87,87,87],[79,79,79],[71,71,71],[67,67,67],[59,59,59],[55,55,55],[47,47,47],[39,39,39],[35,35,35],[119,255,111],[111,239,103],[103,223,95],[95,207,87],[91,191,79],[83,175,71],[75,159,63],[67,147,55],[63,131,47],[55,115,43],[47,99,35],[39,83,27],[31,67,23],[23,51,15],[19,35,11],[11,23,7],[191,167,143],[183,159,135],[175,151,127],[167,143,119],[159,135,111],[155,127,107],[147,123,99],[139,115,91],[131,107,87],[123,99,79],[119,95,75],[111,87,67],[103,83,63],[95,75,55],[87,67,51],[83,63,47],[159,131,99],[143,119,83],[131,107,75],[119,95,63],[103,83,51],[91,71,43],[79,59,35],[67,51,27],[123,127,99],[111,115,87],[103,107,79],[91,99,71],[83,87,59],[71,79,51],[63,71,43],[55,63,39],[255,255,115],[235,219,87],[215,187,67],[195,155,47],[175,123,31],[155,91,19],[135,67,7],[115,43,0],[255,255,255],[255,219,219],[255,187,187],[255,155,155],[255,123,123],[255,95,95],[255,63,63],[255,31,31],[255,0,0],[239,0,0],[227,0,0],[215,0,0],[203,0,0],[191,0,0],[179,0,0],[167,0,0],[155,0,0],[139,0,0],[127,0,0],[115,0,0],[103,0,0],[91,0,0],[79,0,0],[67,0,0],[231,231,255],[199,199,255],[171,171,255],[143,143,255],[115,115,255],[83,83,255],[55,55,255],[27,27,255],[0,0,255],[0,0,227],[0,0,203],[0,0,179],[0,0,155],[0,0,131],[0,0,107],[0,0,83],[255,255,255],[255,235,219],[255,215,187],[255,199,155],[255,179,123],[255,163,91],[255,143,59],[255,127,27],[243,115,23],[235,111,15],[223,103,15],[215,95,11],[203,87,7],[195,79,0],[183,71,0],[175,67,0],[255,255,255],[255,255,215],[255,255,179],[255,255,143],[255,255,107],[255,255,71],[255,255,35],[255,255,0],[167,63,0],[159,55,0],[147,47,0],[135,35,0],[79,59,39],[67,47,27],[55,35,19],[47,27,11],[0,0,83],[0,0,71],[0,0,59],[0,0,47],[0,0,35],[0,0,23],[0,0,11],[0,0,0],[255,159,67],[255,231,75],[255,123,255],[255,0,255],[207,0,207],[159,0,155],[111,0,107],[167,107,107]];

// Precompute palette lookup (nearest color in RGB space)
function nearestDoomColor(r, g, b) {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < 256; i++) {
    const dr = r - DOOM_PALETTE[i][0];
    const dg = g - DOOM_PALETTE[i][1];
    const db = b - DOOM_PALETTE[i][2];
    const d = dr*dr + dg*dg + db*db;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function convert() {
  if (!loadedImage) return;

  const mode = colorModeSel.value;
  const thresh = parseInt(thresholdSlider.value);
  const dither = ditherSel.value;
  const doInvert = invertSel.value === '1';

  // Draw image to offscreen canvas at 320x200
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const oc = off.getContext('2d');
  oc.drawImage(loadedImage, 0, 0, W, H);
  const imgData = oc.getImageData(0, 0, W, H);
  const data = imgData.data;

  // Grayscale
  const gray = new Float32Array(W * H);
  for (let i = 0; i < W * H; i++) {
    gray[i] = getGray(data[i*4], data[i*4+1], data[i*4+2]);
  }

  const previewData = oc.createImageData(W, H);
  const lines = [];

  if (mode === '8bit' || mode === '8bit_gray') {
    // 8bit modes
    binaryBytes = new Uint8Array(W * H);
    if (mode === '8bit_gray') {
      // Grayscale: raw 0-255 value, +1 for Scratch
      for (let i = 0; i < W * H; i++) {
        let v = Math.round(gray[i]);
        if (doInvert) v = 255 - v;
        binaryBytes[i] = v;
        previewData.data[i*4]   = v;
        previewData.data[i*4+1] = v;
        previewData.data[i*4+2] = v;
        previewData.data[i*4+3] = 255;
        lines.push((v + 1).toString()); // +1 for Scratch 1-indexed list
      }
    } else {
      // DOOM palette: nearest color index, +1 for Scratch
      for (let i = 0; i < W * H; i++) {
        const pr = data[i*4], pg = data[i*4+1], pb = data[i*4+2];
        let idx = nearestDoomColor(pr, pg, pb);
        if (doInvert) idx = 255 - idx;
        binaryBytes[i] = idx;
        const [mr, mg, mb] = DOOM_PALETTE[idx];
        previewData.data[i*4]   = mr;
        previewData.data[i*4+1] = mg;
        previewData.data[i*4+2] = mb;
        previewData.data[i*4+3] = 255;
        lines.push((idx + 1).toString()); // +1 for Scratch 1-indexed list
      }
    }
    ctx.putImageData(previewData, 0, 0);

    document.getElementById('statTotal').textContent = (W*H).toLocaleString();
    document.getElementById('statPixels').textContent = (W*H).toLocaleString();
    document.getElementById('statOnes').textContent = '—';
    document.getElementById('statZeros').textContent = '—';
    document.getElementById('metaLines').textContent = lines.length.toLocaleString();
    document.getElementById('metaNibbles').textContent = lines.length.toLocaleString();


  } else {
    // 1bit mode
    const bits = new Uint8Array(W * H);

    if (dither === 'floyd') {
      const g = new Float32Array(gray);
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const idx = y * W + x;
          const old = g[idx];
          const nv = old > thresh ? 255 : 0;
          bits[idx] = nv === 255 ? 1 : 0;
          const err = old - nv;
          if (x+1 < W)            g[idx+1]   += err * 7/16;
          if (y+1 < H && x > 0)   g[idx+W-1] += err * 3/16;
          if (y+1 < H)             g[idx+W]   += err * 5/16;
          if (y+1 < H && x+1 < W) g[idx+W+1] += err * 1/16;
        }
      }
    } else if (dither === 'ordered') {
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const b = bayer4[(y%4)*4+(x%4)] / 16 * 255;
          bits[y*W+x] = gray[y*W+x] + b > thresh + 127.5 ? 1 : 0;
        }
      }
    } else {
      for (let i = 0; i < W * H; i++) {
        bits[i] = gray[i] > thresh ? 1 : 0;
      }
    }

    if (doInvert) {
      for (let i = 0; i < bits.length; i++) bits[i] ^= 1;
    }

    let ones = 0, zeros = 0;
    for (let i = 0; i < W * H; i++) {
      const v = bits[i] ? 255 : 0;
      if (bits[i]) ones++; else zeros++;
      previewData.data[i*4]   = v;
      previewData.data[i*4+1] = v;
      previewData.data[i*4+2] = v;
      previewData.data[i*4+3] = 255;
    }
    ctx.putImageData(previewData, 0, 0);

    const byteCount = Math.ceil(W * H / 8);
    binaryBytes = new Uint8Array(byteCount);
    const useMSB = bitOrderSel.value === 'msb';
    for (let i = 0; i < W * H; i++) {
      if (bits[i]) {
        if (useMSB) binaryBytes[i >> 3] |= (0x80 >> (i & 7));
        else        binaryBytes[i >> 3] |= (1 << (i & 7));
      }
    }

    const hiLoOrder = nibbleOrderSel.value === 'hi_lo';
    for (let b = 0; b < binaryBytes.length; b++) {
      const hi = (binaryBytes[b] >> 4) & 0x0F;
      const lo = binaryBytes[b] & 0x0F;
      if (hiLoOrder) { lines.push(hi.toString()); lines.push(lo.toString()); }
      else           { lines.push(lo.toString()); lines.push(hi.toString()); }
    }

    document.getElementById('statTotal').textContent = byteCount.toLocaleString();
    document.getElementById('statPixels').textContent = (W*H).toLocaleString();
    document.getElementById('statOnes').textContent = ones.toLocaleString();
    document.getElementById('statZeros').textContent = zeros.toLocaleString();
    document.getElementById('metaLines').textContent = lines.length.toLocaleString();
    document.getElementById('metaNibbles').textContent = lines.length.toLocaleString();
  }

  outputText.value = lines.join('\n');
  copyBtn.disabled = false;
  dlBtn.disabled = false;
  dlBinBtn.disabled = false;
}

convertBtn.addEventListener('click', convert);

// Toggle 1bit-only controls visibility
colorModeSel.addEventListener('change', () => {
  const is1bit = colorModeSel.value === '1bit';
  document.getElementById('oneBitOptions').style.display = is1bit ? '' : 'none';
});

// Auto-convert on param change if image loaded
[thresholdSlider, ditherSel, invertSel, bitOrderSel, nibbleOrderSel, colorModeSel].forEach(el => {
  el.addEventListener('change', () => { if (loadedImage && !convertBtn.disabled) convert(); });
});

// Copy
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(outputText.value).then(() => {
    copyBtn.textContent = '✓ COPIED';
    setTimeout(() => copyBtn.textContent = '⎘ COPY', 1500);
  });
});

// Download TXT
dlBtn.addEventListener('click', () => {
  const dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent(outputText.value);
  const a = document.createElement('a'); a.href = dataUri;
  a.download = 'bitmap_nibbles.txt'; a.click();
});

// Download BIN
dlBinBtn.addEventListener('click', () => {
  if (!binaryBytes) return;
  let binary = '';
  for (let i = 0; i < binaryBytes.length; i++) binary += String.fromCharCode(binaryBytes[i]);
  const b64 = btoa(binary);
  const a = document.createElement('a');
  a.href = 'data:application/octet-stream;base64,' + b64;
  a.download = `bitmap_320x200_${colorModeSel.value}.bin`; a.click();
});
</script>
</body>
</html>
